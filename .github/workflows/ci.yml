name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extension-build:
    name: Extension Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Print build metadata
        working-directory: extension
        run: |
          echo "Version: $(node -p "require('./package.json').version")"
          echo "Commit: $(git rev-parse --short=7 HEAD)"

      - name: Compile TypeScript
        working-directory: extension
        run: npm run compile

      - name: Upload extension build artifact
        uses: actions/upload-artifact@v7
        with:
          name: extension-out
          path: |
            extension/out
            extension/package.json
          retention-days: 7

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache-dependency-path: native/go/go.sum

      - name: Test Go backend
        working-directory: native/go
        run: go test ./...

      - name: Build backend for all VS Code targets
        working-directory: native/go
        run: bash ./scripts/build-all.sh

      - name: List backend binaries
        run: find native/go/dist -maxdepth 2 -type f -name 'canmv-backend*' -print | sort

      - name: Upload backend artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-dist
          path: native/go/dist
          retention-days: 7

  package-vsix:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs:
      - extension-build
      - backend-build

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Download backend artifact
        uses: actions/download-artifact@v8
        with:
          name: backend-dist
          path: native/go/dist

      - name: Restore executable permissions
        run: chmod +x native/go/dist/linux-*/canmv-backend native/go/dist/darwin-*/canmv-backend

      - name: Package VSIX
        env:
          CANMV_SKIP_BACKEND_BUILD: "1"
        run: bash scripts/package.sh

      - name: List VSIX
        run: ls -lh release/*.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: canmv-vscode-vsix
          path: release/canmv-vscode-*.vsix
          retention-days: 30

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: package-vsix
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Download VSIX artifact
        uses: actions/download-artifact@v8
        with:
          name: canmv-vscode-vsix
          path: release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*.vsix

  publish-marketplace:
    name: Publish Marketplace
    runs-on: ubuntu-latest
    needs: package-vsix
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v8
        with:
          name: canmv-vscode-vsix
          path: release

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath release/*.vsix -p "$VSCE_PAT" --skip-duplicate
