<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CanMV Terminal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #111; color: #d6d6d6;
      font-family: var(--vscode-editor-font-family, ui-monospace, SFMono-Regular, Consolas, monospace);
      font-size: var(--vscode-editor-font-size, 12px);
    }
    #toolbar {
      min-height: 38px; display: flex; align-items: center; gap: 8px;
      padding: 4px 10px; border-bottom: 1px solid var(--vscode-panel-border, #333);
      background: var(--vscode-sideBar-background, #181818);
      white-space: nowrap;
    }
    .label { color: var(--vscode-descriptionForeground, #aaa); }
    .select, button {
      height: 28px; border: 1px solid var(--vscode-dropdown-border, #444);
      background: var(--vscode-dropdown-background, #222);
      color: var(--vscode-dropdown-foreground, #ddd);
      border-radius: 2px; padding: 0 10px;
      font: inherit;
    }
    button {
      cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
      min-width: 28px; padding: 0 8px;
    }
    .status {
      height: 28px; display: inline-flex; align-items: center;
      background: var(--vscode-button-background, #0e639c);
      color: var(--vscode-button-foreground, #fff);
      border: 1px solid var(--vscode-button-background, #0e639c);
      border-radius: 2px; padding: 0 10px;
      font: inherit;
    }
    button:hover { background: var(--vscode-toolbar-hoverBackground, #333); }
    #spacer { flex: 1; }
    #terminalWrap {
      width: 100%; height: calc(100% - 38px);
      padding: 8px 14px; overflow: auto; line-height: 1.45;
      outline: none; cursor: text;
    }
    #terminal, #promptLine {
      white-space: pre-wrap; overflow-wrap: anywhere;
    }
    #promptLine.disabled {
      color: var(--vscode-disabledForeground, #777);
    }
    #cursor {
      display: inline-block; width: 0.65em; height: 1.15em;
      margin-bottom: -0.18em; background: var(--vscode-terminalCursor-foreground, #d6d6d6);
      vertical-align: baseline;
    }
    #terminalWrap:not(:focus) #cursor {
      background: transparent;
      outline: 1px solid var(--vscode-terminalCursor-foreground, #d6d6d6);
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <span class="status">▶ Monitoring</span>
    <span class="label">View Mode</span>
    <select class="select" disabled><option>Text</option></select>
    <span class="label">Source</span>
    <select class="select" disabled><option>CanMV USBDBG</option></select>
    <span id="spacer"></span>
    <button id="saveLog" title="Save Log" aria-label="Save Log">Save Log</button>
    <button id="clear" title="Clear Output" aria-label="Clear Output">Clear</button>
  </div>
  <div id="terminalWrap" tabindex="0" role="textbox" aria-label="CanMV Terminal">
    <pre id="terminal"></pre>
    <div id="promptLine"></div>
  </div>

  <script>
    const vscode = acquireVsCodeApi();
    const l10n = window.__CANMV_L10N__ || {};
    const text = (key, fallback) => l10n[key] || fallback;
    const terminalWrap = document.getElementById('terminalWrap');
    const terminal = document.getElementById('terminal');
    const promptLine = document.getElementById('promptLine');
    const saveLog = document.getElementById('saveLog');
    const clear = document.getElementById('clear');
    let inputEnabled = false;
    let disabledReason = text('connectReplInput', 'Connect board to use REPL input');
    let interruptEnabled = false;
    let pendingInput = '';
    let pendingFlush = 0;
    let lines = [''];
    let cursorRow = 0;
    let cursorCol = 0;
    let renderFrame = 0;
    let scrollAfterRender = false;
    let outputQueue = [];
    let outputQueueSize = 0;
    let outputDrainTimer = 0;
    const maxTerminalLines = 4000;
    const maxTerminalChars = 128 * 1024;
    const maxOutputSliceChars = 32 * 1024;
    const maxOutputSliceMs = 8;
    const maxQueuedOutputChars = 512 * 1024;

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (msg.type === 'append') {
        append(msg.text || '');
      } else if (msg.type === 'clear') {
        clearTerminal();
      } else if (msg.type === 'inputState') {
        setInputState(!!msg.enabled, msg.reason || '', !!msg.interruptEnabled);
      }
    });

    terminalWrap.addEventListener('click', () => terminalWrap.focus());

    terminalWrap.addEventListener('keydown', (event) => {
      if (event.ctrlKey || event.metaKey) {
        if (event.ctrlKey && !event.metaKey && !event.shiftKey && !event.altKey) {
          const control = controlChar(event.key);
          if (control && shouldSendControl(event.key)) {
            consumeKeyboardEvent(event);
            sendControl(control);
          }
        }
        return;
      }
      if (event.altKey) return;

      if (!inputEnabled) return;

      if (event.key === 'Enter') {
        consumeKeyboardEvent(event);
        sendInputImmediate('\r');
      } else if (event.key === 'Backspace') {
        consumeKeyboardEvent(event);
        sendInputImmediate('\x7f');
      } else if (event.key === 'Delete') {
        consumeKeyboardEvent(event);
        sendInputImmediate('\x1b[3~');
      } else if (event.key === 'ArrowLeft') {
        consumeKeyboardEvent(event);
        sendInputImmediate('\x1b[D');
      } else if (event.key === 'ArrowRight') {
        consumeKeyboardEvent(event);
        sendInputImmediate('\x1b[C');
      } else if (event.key === 'Home') {
        consumeKeyboardEvent(event);
        sendInputImmediate('\x1b[H');
      } else if (event.key === 'End') {
        consumeKeyboardEvent(event);
        sendInputImmediate('\x1b[F');
      } else if (event.key === 'ArrowUp') {
        consumeKeyboardEvent(event);
        sendInputImmediate('\x1b[A');
      } else if (event.key === 'ArrowDown') {
        consumeKeyboardEvent(event);
        sendInputImmediate('\x1b[B');
      } else if (event.key === 'Tab') {
        consumeKeyboardEvent(event);
        sendInputImmediate('\t');
      } else {
        const sequence = specialSequence(event.key);
        if (sequence) {
          consumeKeyboardEvent(event);
          sendInputImmediate(sequence);
        } else if (event.key.length === 1) {
          consumeKeyboardEvent(event);
          sendInput(event.key);
        }
      }
    }, true);

    terminalWrap.addEventListener('paste', (event) => {
      if (!inputEnabled) return;
      event.preventDefault();
      const text = event.clipboardData?.getData('text') || '';
      if (text) {
        sendInputImmediate(text);
      }
    });

    saveLog.addEventListener('click', () => {
      vscode.postMessage({ type: 'saveTerminalLog' });
    });

    clear.addEventListener('click', () => {
      clearTerminal();
      vscode.postMessage({ type: 'clearTerminal' });
    });
    vscode.postMessage({ type: 'terminalReady' });

    function applyLocalization() {
      document.documentElement.lang = navigator.language || 'en';
      document.title = text('terminalTitle', 'CanMV Terminal');
      document.querySelector('.status').textContent = '▶ ' + text('monitoring', 'Monitoring');
      const labels = document.querySelectorAll('.label');
      if (labels[0]) labels[0].textContent = text('viewMode', 'View Mode');
      if (labels[1]) labels[1].textContent = text('source', 'Source');
      const selects = document.querySelectorAll('.select option');
      if (selects[0]) selects[0].textContent = text('text', 'Text');
      if (selects[1]) selects[1].textContent = 'CanMV USBDBG';
      saveLog.textContent = text('saveLog', 'Save Log');
      saveLog.title = text('saveLog', 'Save Log');
      saveLog.setAttribute('aria-label', text('saveLog', 'Save Log'));
      clear.textContent = text('clear', 'Clear');
      clear.title = text('clearOutput', 'Clear Output');
      clear.setAttribute('aria-label', text('clearOutput', 'Clear Output'));
      terminalWrap.setAttribute('aria-label', text('terminalTitle', 'CanMV Terminal'));
    }

    function append(text) {
      if (!text) return;
      enqueueOutput(text);
      scheduleOutputDrain();
    }

    function setInputState(enabled, reason, canInterrupt) {
      const nextReason = reason || text('replInputUnavailable', 'REPL input unavailable');
      const wasEnabled = inputEnabled;
      if (inputEnabled === enabled && interruptEnabled === canInterrupt && disabledReason === nextReason) {
        return;
      }
      inputEnabled = enabled;
      interruptEnabled = canInterrupt;
      disabledReason = nextReason;
      renderInputState();
      if (enabled && !wasEnabled) {
        terminalWrap.focus();
      }
    }

    function sendControl(text) {
      if (!inputEnabled && interruptEnabled && text === '\x03') {
        flushInput();
        vscode.postMessage({ type: 'terminalInput', text });
        return;
      }
      sendInputImmediate(text);
    }

    function sendInput(text) {
      if (!inputEnabled || text.length === 0) return;
      pendingInput += text;
      if (pendingFlush) return;
      pendingFlush = window.setTimeout(flushInput, 0);
    }

    function sendInputImmediate(text) {
      flushInput();
      if (!inputEnabled || text.length === 0) return;
      vscode.postMessage({ type: 'terminalInput', text });
    }

    function flushInput() {
      if (pendingFlush) {
        window.clearTimeout(pendingFlush);
        pendingFlush = 0;
      }
      if (!inputEnabled || pendingInput.length === 0) {
        pendingInput = '';
        return;
      }
      const text = pendingInput;
      pendingInput = '';
      vscode.postMessage({ type: 'terminalInput', text });
    }

    function consumeKeyboardEvent(event) {
      event.preventDefault();
      event.stopPropagation();
      if (typeof event.stopImmediatePropagation === 'function') {
        event.stopImmediatePropagation();
      }
    }

    function shouldSendControl(key) {
      const lower = key.toLowerCase();
      if (!inputEnabled && !(interruptEnabled && lower === 'c')) return false;
      return lower === 'a' || lower === 'b' || lower === 'c' || lower === 'd' || lower === 'e';
    }

    function controlChar(key) {
      if (key === ' ') return '\x00';
      if (!key || key.length !== 1) return '';
      const upper = key.toUpperCase();
      const code = upper.charCodeAt(0);
      if (code >= 64 && code <= 95) {
        return String.fromCharCode(code - 64);
      }
      return '';
    }

    function specialSequence(key) {
      const sequences = {
        Escape: '\x1b',
        Insert: '\x1b[2~',
        PageUp: '\x1b[5~',
        PageDown: '\x1b[6~',
        F1: '\x1bOP',
        F2: '\x1bOQ',
        F3: '\x1bOR',
        F4: '\x1bOS',
        F5: '\x1b[15~',
        F6: '\x1b[17~',
        F7: '\x1b[18~',
        F8: '\x1b[19~',
        F9: '\x1b[20~',
        F10: '\x1b[21~',
        F11: '\x1b[23~',
        F12: '\x1b[24~',
      };
      return sequences[key] || '';
    }

    function renderInputState() {
      promptLine.classList.toggle('disabled', !inputEnabled);
      if (!inputEnabled) {
        promptLine.textContent = disabledReason;
        scheduleRender(false);
        return;
      }
      promptLine.textContent = '';
      scheduleRender(true);
    }

    function clearTerminal() {
      clearQueuedOutput();
      lines = [''];
      cursorRow = 0;
      cursorCol = 0;
      renderNow(false);
    }

    function enqueueOutput(text) {
      outputQueue.push(text);
      outputQueueSize += text.length;
      trimOutputQueue();
    }

    function trimOutputQueue() {
      while (outputQueueSize > maxQueuedOutputChars && outputQueue.length > 1) {
        const removed = outputQueue.shift() || '';
        outputQueueSize -= removed.length;
      }

      if (outputQueueSize > maxQueuedOutputChars && outputQueue.length === 1) {
        const excess = outputQueueSize - maxQueuedOutputChars;
        outputQueue[0] = outputQueue[0].slice(excess);
        outputQueueSize -= excess;
      }
    }

    function clearQueuedOutput() {
      if (outputDrainTimer) {
        window.clearTimeout(outputDrainTimer);
        outputDrainTimer = 0;
      }
      outputQueue = [];
      outputQueueSize = 0;
    }

    function scheduleOutputDrain() {
      if (outputDrainTimer) return;
      outputDrainTimer = window.setTimeout(drainOutputQueue, 0);
    }

    function drainOutputQueue() {
      outputDrainTimer = 0;
      const deadline = nowMs() + maxOutputSliceMs;
      let wrote = false;

      while (outputQueue.length > 0) {
        let chunk = takeOutputChunk(maxOutputSliceChars);
        if (!chunk) break;
        if (outputQueue.length > 0) {
          const safeLength = completeEscapeSafeLength(chunk);
          if (safeLength === 0) {
            pushOutputFront(chunk);
            break;
          }
          if (safeLength < chunk.length) {
            pushOutputFront(chunk.slice(safeLength));
            chunk = chunk.slice(0, safeLength);
          }
        }
        writeTerminal(chunk);
        wrote = true;
        if (nowMs() >= deadline) break;
      }

      if (wrote) {
        trimTerminalBuffer();
        scheduleRender(true);
      }
      if (outputQueue.length > 0) {
        scheduleOutputDrain();
      }
    }

    function takeOutputChunk(maxChars) {
      const parts = [];
      let remaining = maxChars;
      while (remaining > 0 && outputQueue.length > 0) {
        const first = outputQueue[0] || '';
        if (first.length <= remaining) {
          parts.push(first);
          outputQueue.shift();
          outputQueueSize -= first.length;
          remaining -= first.length;
        } else {
          parts.push(first.slice(0, remaining));
          outputQueue[0] = first.slice(remaining);
          outputQueueSize -= remaining;
          remaining = 0;
        }
      }
      return parts.join('');
    }

    function pushOutputFront(text) {
      if (!text) return;
      outputQueue.unshift(text);
      outputQueueSize += text.length;
    }

    function completeEscapeSafeLength(text) {
      const esc = text.lastIndexOf('\x1b');
      if (esc < 0 || esc === text.length - 1) {
        return esc < 0 ? text.length : esc;
      }
      if (text[esc + 1] !== '[') {
        return text.length;
      }
      for (let i = esc + 2; i < text.length; i++) {
        if (/[A-Za-z~]/.test(text[i])) {
          return text.length;
        }
      }
      return esc;
    }

    function nowMs() {
      return typeof performance !== 'undefined' && typeof performance.now === 'function'
        ? performance.now()
        : Date.now();
    }

    function writeTerminal(text) {
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (ch === '\x1b') {
          i = consumeEscape(text, i);
        } else if (ch === '\r') {
          cursorCol = 0;
          if (text[i + 1] === '\n') {
            cursorRow += 1;
            ensureLine(cursorRow);
            i += 1;
          }
        } else if (ch === '\n') {
          cursorRow += 1;
          ensureLine(cursorRow);
          cursorCol = 0;
        } else if (ch === '\b' || ch === '\x7f') {
          cursorCol = Math.max(0, cursorCol - 1);
        } else if (ch === '\t') {
          const spaces = 4 - (cursorCol % 4);
          putText(' '.repeat(spaces));
        } else if (isPlainTextCode(text.charCodeAt(i))) {
          const start = i;
          i += 1;
          while (i < text.length && isPlainTextCode(text.charCodeAt(i))) {
            i += 1;
          }
          putText(text.slice(start, i));
          i -= 1;
        }
      }
    }

    function isPlainTextCode(code) {
      return code >= 32 && code !== 127;
    }

    function consumeEscape(text, index) {
      if (text[index + 1] !== '[') {
        return index;
      }
      let j = index + 2;
      while (j < text.length && !/[A-Za-z~]/.test(text[j])) {
        j++;
      }
      if (j >= text.length) {
        return text.length - 1;
      }

      const final = text[j];
      const rawParams = text.slice(index + 2, j);
      const params = rawParams.split(';').map((value) => Number.parseInt(value || '0', 10));
      const count = params[0] || 1;

      if (final === 'D') {
        cursorCol = Math.max(0, cursorCol - count);
      } else if (final === 'C') {
        cursorCol += count;
      } else if (final === 'A') {
        cursorRow = Math.max(0, cursorRow - count);
        cursorCol = Math.min(cursorCol, lines[cursorRow].length);
      } else if (final === 'B') {
        cursorRow += count;
        ensureLine(cursorRow);
        cursorCol = Math.min(cursorCol, lines[cursorRow].length);
      } else if (final === 'K') {
        clearLine(params[0] || 0);
      } else if (final === 'J') {
        clearScreen(params[0] || 0);
      } else if (final === 'H' || final === 'f') {
        cursorRow = Math.max(0, (params[0] || 1) - 1);
        cursorCol = Math.max(0, (params[1] || 1) - 1);
        ensureLine(cursorRow);
      }
      return j;
    }

    function putChar(ch) {
      putText(ch);
    }

    function putText(text) {
      if (!text) return;
      ensureLine(cursorRow);
      const line = lines[cursorRow];
      if (cursorCol > line.length) {
        lines[cursorRow] = line + ' '.repeat(cursorCol - line.length) + text;
      } else {
        const endCol = cursorCol + text.length;
        lines[cursorRow] = line.slice(0, cursorCol) + text + line.slice(endCol);
      }
      cursorCol += text.length;
    }

    function clearLine(mode) {
      ensureLine(cursorRow);
      const line = lines[cursorRow];
      if (mode === 1) {
        lines[cursorRow] = ' '.repeat(Math.min(cursorCol, line.length)) + line.slice(cursorCol);
      } else if (mode === 2) {
        lines[cursorRow] = '';
        cursorCol = 0;
      } else {
        lines[cursorRow] = line.slice(0, cursorCol);
      }
    }

    function clearScreen(mode) {
      if (mode === 2) {
        lines = [''];
        cursorRow = 0;
        cursorCol = 0;
      } else if (mode === 0) {
        lines = lines.slice(0, cursorRow + 1);
        clearLine(0);
      }
    }

    function ensureLine(row) {
      while (lines.length <= row) {
        lines.push('');
      }
    }

    function trimTerminalBuffer() {
      while (lines.length > maxTerminalLines) {
        dropFirstLine();
      }

      let total = 0;
      for (const line of lines) {
        total += line.length;
      }

      while (total > maxTerminalChars && lines.length > 1) {
        total -= dropFirstLine();
      }

      if (total > maxTerminalChars && lines.length === 1 && lines[0].length > maxTerminalChars) {
        const excess = lines[0].length - maxTerminalChars;
        lines[0] = lines[0].slice(excess);
        cursorCol = Math.max(0, cursorCol - excess);
      }
    }

    function dropFirstLine() {
      const removed = lines.shift() || '';
      if (lines.length === 0) {
        lines.push('');
      }
      if (cursorRow > 0) {
        cursorRow -= 1;
      } else {
        cursorCol = Math.min(cursorCol, lines[0].length);
      }
      return removed.length;
    }

    function scheduleRender(scroll) {
      scrollAfterRender = scrollAfterRender || scroll;
      if (renderFrame) {
        return;
      }
      renderFrame = window.requestAnimationFrame(() => {
        renderFrame = 0;
        const shouldScroll = scrollAfterRender;
        scrollAfterRender = false;
        renderTerminal();
        if (shouldScroll) {
          scrollToBottom();
        }
      });
    }

    function renderNow(scroll) {
      const shouldScroll = scroll || scrollAfterRender;
      scrollAfterRender = false;
      if (renderFrame) {
        window.cancelAnimationFrame(renderFrame);
        renderFrame = 0;
      }
      renderTerminal();
      if (shouldScroll) {
        scrollToBottom();
      }
    }

    function renderTerminal() {
      if (cursorRow >= lines.length) {
        ensureLine(cursorRow);
      }
      if (!inputEnabled) {
        terminal.textContent = lines.join('\n');
        return;
      }

      if (cursorRow === lines.length - 1) {
        terminal.textContent = lines.length > 1 ? lines.slice(0, -1).join('\n') : '';
        renderCursorLine(promptLine, lines[cursorRow] || '');
        return;
      }

      promptLine.textContent = '';
      terminal.textContent = '';
      for (let row = 0; row < lines.length; row++) {
        if (row > 0) {
          terminal.append(document.createTextNode('\n'));
        }
        const line = lines[row];
        if (inputEnabled && row === cursorRow) {
          const visibleCol = Math.min(cursorCol, line.length);
          const padding = cursorCol > line.length ? ' '.repeat(cursorCol - line.length) : '';
          terminal.append(
            document.createTextNode(line.slice(0, visibleCol)),
            document.createTextNode(padding),
            cursorElement(),
            document.createTextNode(line.slice(visibleCol)),
          );
        } else {
          terminal.append(document.createTextNode(line));
        }
      }
      if (inputEnabled && cursorRow >= lines.length) {
        terminal.append(cursorElement());
      }
    }

    function renderCursorLine(container, line) {
      const visibleCol = Math.min(cursorCol, line.length);
      const padding = cursorCol > line.length ? ' '.repeat(cursorCol - line.length) : '';
      container.textContent = '';
      container.append(
        document.createTextNode(line.slice(0, visibleCol)),
        document.createTextNode(padding),
        cursorElement(),
        document.createTextNode(line.slice(visibleCol)),
      );
    }

    function cursorElement() {
      const cursorEl = document.createElement('span');
      cursorEl.id = 'cursor';
      return cursorEl;
    }

    function scrollToBottom() {
      terminalWrap.scrollTop = terminalWrap.scrollHeight;
    }

    applyLocalization();
    renderInputState();
  </script>
</body>
</html>
