<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CanMV Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; color: #ccc; font-family: sans-serif; }
    body { display: flex; flex-direction: column; }
    #status-bar {
      display: flex; align-items: center; gap: 12px; padding: 4px 10px;
      background: #252525; border-bottom: 1px solid #333; font-size: 12px; font-family: monospace;
    }
    #status-bar .indicator { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .indicator.off { background: #666; }
    .indicator.on { background: #4c4; }
    .indicator.stream { background: #48f; }
    #image-info { color: #888; }
    #fps-display { margin-left: auto; color: #8c8; }
    #toolbar { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: #2d2d2d; border-bottom: 1px solid #444; }
    button {
      width: 28px; height: 24px; border: 1px solid #555; border-radius: 3px;
      background: #3c3c3c; color: #ccc; cursor: pointer; font-size: 12px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    button svg {
      width: 14px; height: 14px; stroke: currentColor; fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }
    button .icon-fill { fill: currentColor; stroke: none; }
    #record-btn .stop-icon { display: none; }
    #record-btn.recording .record-icon { display: none; }
    #record-btn.recording .stop-icon { display: block; }
    button:enabled:hover { background: #4c4c4c; }
    button.active { border-color: #6aa9ff; background: #315f8d; color: #fff; }
    button.recording { border-color: #ff7373; background: #8d3131; color: #fff; }
    button:disabled { opacity: 0.4; cursor: default; }
    select {
      height: 24px; min-width: 148px; border: 1px solid #555; border-radius: 3px;
      background: #3c3c3c; color: #ddd; font-size: 12px; padding: 0 22px 0 6px;
    }
    select:focus, button:focus { outline: 1px solid #6aa9ff; outline-offset: 1px; }
    .toolbar-separator { width: 1px; height: 18px; background: #555; margin: 0 4px; }
    .select-label { color: #aaa; font-size: 12px; line-height: 24px; }
    #tool-readout {
      flex: 0 1 260px; min-width: 0; max-width: 42vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: #b8b8b8; font: 11px/24px monospace;
    }
    #main {
      flex: 1; min-height: 0; width: 100%; display: flex; background: #1e1e1e;
    }
    #canvas-wrap {
      flex: 1 1 auto; min-width: 0; min-height: 0; overflow: hidden; background: #1e1e1e;
    }
    #canvas-wrap.original { overflow: auto; }
    #canvas-stage {
      min-width: 100%; min-height: 100%; display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    #canvas-wrap.original #canvas-stage { width: max-content; height: max-content; }
    canvas { flex: 0 0 auto; display: block; }
    #canvas-overlay {
      position: absolute; pointer-events: none; display: none; z-index: 2;
    }
    #roi-rect, #drag-rect {
      position: absolute; display: none; border: 1px solid #6aa9ff;
      background: rgba(106, 169, 255, 0.16);
    }
    #drag-rect { border-style: dashed; }
    #pixel-marker {
      position: absolute; display: none; width: 13px; height: 13px;
      border: 1px solid #f2f2f2; border-radius: 50%;
      transform: translate(-6px, -6px);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.75);
    }
    #histogram-panel {
      flex: 0 0 320px; min-width: 260px; max-width: 42vw; overflow: auto;
      border-left: 1px solid #333; background: #202020;
    }
    #histogram-panel.hidden { display: none; }
    #histogram-channels { display: flex; flex-direction: column; gap: 0; min-height: 100%; }
    .hist-channel {
      padding: 8px 10px 9px; border-bottom: 1px solid #333;
    }
    .hist-channel[hidden] { display: none; }
    .hist-title {
      height: 16px; color: #ddd; font-size: 12px; font-weight: 600; line-height: 16px;
    }
    .hist-canvas {
      width: 100%; height: 74px; margin: 5px 0 7px;
      border: 1px solid #3a3a3a; background: #151515;
    }
    .hist-canvas.hoverable { cursor: crosshair; }
    #histogram-tooltip {
      position: fixed; z-index: 10; display: none; pointer-events: none;
      max-width: min(280px, calc(100vw - 16px)); padding: 3px 7px; border: 1px solid #555; border-radius: 3px;
      background: #2d2d2d; color: #ddd; font: 11px/1.35 monospace;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      white-space: normal; overflow-wrap: anywhere;
    }
    .hist-stats {
      display: grid; grid-template-columns: repeat(4, auto minmax(3ch, 1fr));
      gap: 2px 6px; color: #aaa; font: 11px/1.25 monospace;
    }
    .stat-label { color: #777; }
    .stat-value { color: #d0d0d0; text-align: right; min-width: 4ch; }
    @media (max-width: 760px) {
      #main { flex-direction: column; }
      #histogram-panel {
        flex: 0 0 224px; width: 100%; max-width: none; min-width: 0;
        border-left: 0; border-top: 1px solid #333;
      }
      #histogram-channels { flex-direction: row; min-height: 0; }
      .hist-channel { flex: 1 1 0; min-width: 190px; border-right: 1px solid #333; border-bottom: 0; }
    }
  </style>
</head>
<body>
  <div id="status-bar">
    <span><span class="indicator off" id="status-dot"></span><span id="state-text">Disconnected</span></span>
    <span id="image-info">Image: --</span>
    <span id="fps-display">FPS: --</span>
  </div>
  <div id="toolbar">
    <button id="disable-btn" title="Disable Preview" aria-label="Disable Preview">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12"/><path d="M4 12a9 9 0 0 1 16 0"/><path d="M9 12a3 3 0 0 0 4 2.8"/></svg>
    </button>
    <button id="scale-btn" title="Show Original Size" aria-label="Show Original Size">1:1</button>
    <button id="rotate-btn" title="Rotate Frame" aria-label="Rotate Frame">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg>
    </button>
    <button id="save-btn" title="Save Image" aria-label="Save Image">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
    </button>
    <button id="pixel-btn" title="Pick Pixel Value" aria-label="Pick Pixel Value">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m14 5 5 5"/><path d="m5 19 4-1 9-9-3-3-9 9-1 4Z"/><path d="M5 19h5"/></svg>
    </button>
    <button id="roi-btn" title="Select Histogram ROI" aria-label="Select Histogram ROI">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h14v14H5z"/><path d="M9 3v4"/><path d="M15 3v4"/><path d="M9 17v4"/><path d="M15 17v4"/></svg>
    </button>
    <button id="record-btn" title="Record Video" aria-label="Record Video">
      <svg class="record-icon" viewBox="0 0 24 24" aria-hidden="true"><circle class="icon-fill" cx="12" cy="12" r="6"/></svg>
      <svg class="stop-icon" viewBox="0 0 24 24" aria-hidden="true"><path class="icon-fill" d="M7 7h10v10H7z"/></svg>
    </button>
    <span id="tool-readout" aria-live="polite"></span>
    <span class="toolbar-separator" aria-hidden="true"></span>
    <label class="select-label" for="histogram-select">Histogram</label>
    <select id="histogram-select" title="Histogram color space" aria-label="Histogram color space">
      <option value="rgb">RGB Color Space</option>
      <option value="grayscale">Grayscale Color Space</option>
      <option value="lab">LAB Color Space</option>
      <option value="yuv">YUV Color Space</option>
      <option value="none">None</option>
    </select>
  </div>
  <div id="main">
    <div id="canvas-wrap">
      <div id="canvas-stage">
        <canvas id="canvas"></canvas>
        <div id="canvas-overlay" aria-hidden="true">
          <div id="roi-rect"></div>
          <div id="drag-rect"></div>
          <div id="pixel-marker"></div>
        </div>
      </div>
    </div>
    <div id="histogram-panel">
      <div id="histogram-channels">
        <section class="hist-channel" data-channel="0">
          <div class="hist-title">R</div>
          <canvas class="hist-canvas" width="280" height="74"></canvas>
          <div class="hist-stats"></div>
        </section>
        <section class="hist-channel" data-channel="1">
          <div class="hist-title">G</div>
          <canvas class="hist-canvas" width="280" height="74"></canvas>
          <div class="hist-stats"></div>
        </section>
        <section class="hist-channel" data-channel="2">
          <div class="hist-title">B</div>
          <canvas class="hist-canvas" width="280" height="74"></canvas>
          <div class="hist-stats"></div>
        </section>
      </div>
    </div>
  </div>
  <div id="histogram-tooltip" role="tooltip"></div>

  <script>
    const vscode = acquireVsCodeApi();
    const l10n = window.__CANMV_L10N__ || {};
    const text = (key, fallback) => l10n[key] || fallback;
    const formatText = (template, values) => template.replace(/\{(\w+)\}/g, (_, key) => values[key] ?? '');
    const statusDot = document.getElementById('status-dot');
    const stateText = document.getElementById('state-text');
    const imageInfo = document.getElementById('image-info');
    const fpsDisplay = document.getElementById('fps-display');
    const disableBtn = document.getElementById('disable-btn');
    const scaleBtn = document.getElementById('scale-btn');
    const rotateBtn = document.getElementById('rotate-btn');
    const saveBtn = document.getElementById('save-btn');
    const pixelBtn = document.getElementById('pixel-btn');
    const roiBtn = document.getElementById('roi-btn');
    const recordBtn = document.getElementById('record-btn');
    const toolReadout = document.getElementById('tool-readout');
    const histogramSelect = document.getElementById('histogram-select');
    const histogramPanel = document.getElementById('histogram-panel');
    const histogramTooltip = document.getElementById('histogram-tooltip');
    const histogramChannels = Array.from(document.querySelectorAll('.hist-channel')).map((el) => ({
      el,
      title: el.querySelector('.hist-title'),
      canvas: el.querySelector('.hist-canvas'),
      stats: el.querySelector('.hist-stats')
    }));
    const canvasWrap = document.getElementById('canvas-wrap');
    const canvasStage = document.getElementById('canvas-stage');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const canvasOverlay = document.getElementById('canvas-overlay');
    const roiRectEl = document.getElementById('roi-rect');
    const dragRectEl = document.getElementById('drag-rect');
    const pixelMarkerEl = document.getElementById('pixel-marker');
    const histogramSampleCanvas = document.createElement('canvas');
    const histogramSampleCtx = histogramSampleCanvas.getContext('2d', { willReadFrequently: true });
    const savedState = vscode.getState() || {};

    let isRendering = false, pendingFrame = null, fpsFrames = [], frameCount = 0;
    let currentState = 'disconnected', rotation = 0, hasFrame = false, lastFrameData = null, previewDisabled = false;
    let virtualTouchEnabled = false, virtualTouchSupported = false;
    let scaleMode = savedState.scaleMode === 'original' ? 'original' : 'fit';
    let histogramMode = isHistogramMode(savedState.histogramMode) ? savedState.histogramMode : 'none';
    let lastImageSize = null;
    let profileEnabled = false, profileRecords = {};
    let lastOriginalLayout = '';
    let resizeRenderPending = false;
    let resizeRenderFrame = 0;
    let histogramUpdatePending = false;
    let histogramUpdateTimer = 0;
    let histogramLastAt = 0;
    let lastHistogramChannels = [];
    let histogramHover = null;
    let pixelPickEnabled = false;
    let roiSelectEnabled = false;
    let selectedRoi = isValidRoi(savedState.selectedRoi) ? savedState.selectedRoi : null;
    let dragRoi = null;
    let roiDragStart = null;
    let isDraggingRoi = false;
    let lastPixelPick = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let recordingMimeType = '';
    let recordingExtension = 'webm';
    let isRecording = false;
    const fpsWindowMs = 3000;
    const fpsHoldMs = 3000;
    const histogramMaxSampleEdge = 160;
    const histogramMinIntervalMs = 250;
    let lastFpsValue = null;
    let lastFpsSampleAt = 0;

    const stateStyles = {
      disconnected: { dot: 'off', text: text('stateDisconnected', 'Disconnected') },
      connecting:    { dot: 'on',  text: text('stateConnecting', 'Connecting...') },
      connected:     { dot: 'on',  text: text('stateConnected', 'Connected') },
      streaming:     { dot: 'stream', text: text('stateStreaming', 'Streaming') }
    };

    window.addEventListener('message', (e) => {
      let m = e.data;
      switch (m.type) {
        case 'state':
          { let s = stateStyles[m.state] || stateStyles.disconnected;
            currentState = m.state || 'disconnected';
            statusDot.className = 'indicator ' + s.dot;
            stateText.textContent = s.text;
            if (currentState === 'disconnected') {
              setVirtualTouchState({ supported: false, enabled: false });
              clearCanvas();
            }
            updateControls(); }
          break;
        case 'profileConfig':
          profileEnabled = m.enabled === true;
          break;
        case 'previewDisabled':
          previewDisabled = m.disabled === true;
          updateControls();
          break;
        case 'scriptRunning':
          updateControls();
          break;
        case 'virtualTouchState':
          setVirtualTouchState(m);
          break;
        case 'captureImage':
          captureCurrentImage();
          break;
        case 'boardInfo':
          break;
        case 'started':
          resetFps();
          previewDisabled = false;
          currentState = 'streaming'; updateControls();
          break;
        case 'stopped':
          resetFps();
          imageInfo.textContent = text('imageEmpty', 'Image: --');
          pendingFrame = null; isRendering = false;
          currentState = 'connected'; updateControls();
          break;
        case 'frame':
          if (profileEnabled) {
            const fid = m.frameId || 0;
            if (!profileRecords[fid]) profileRecords[fid] = {};
            profileRecords[fid].ts_webview_msg = performance.now();
          }
          const frameData = normalizeFrameData(m.data, m.byteLength);
          if (!frameData) {
            imageInfo.textContent = text('imageDecodeError', 'Image: decode error');
            console.error('Unsupported frame payload', m.data);
            break;
          }
          lastFrameData = frameData;
          pendingFrame = { data: frameData, frameId: m.frameId || 0 };
          hasFrame = true; updateControls();
          frameCount++;
          if (!isRendering) { const f = pendingFrame; pendingFrame = null; renderFrame(f.data, f.frameId); }
          break;
      }
    });

    function normalizeFrameData(data, byteLength) {
      if (data instanceof ArrayBuffer) return new Uint8Array(data);
      if (ArrayBuffer.isView(data)) return new Uint8Array(data.buffer, data.byteOffset, data.byteLength);
      if (Array.isArray(data)) return new Uint8Array(data);
      if (!data || typeof data !== 'object') return null;

      if (data.type === 'Buffer' && Array.isArray(data.data)) {
        return new Uint8Array(data.data);
      }

      const declaredLength = Number.isInteger(byteLength) ? byteLength : Number(data.byteLength ?? data.length);
      if (Number.isInteger(declaredLength) && declaredLength >= 0) {
        const out = new Uint8Array(declaredLength);
        for (let i = 0; i < declaredLength; i++) out[i] = data[i] || 0;
        return out;
      }

      const keys = Object.keys(data).filter((key) => /^\d+$/.test(key)).sort((a, b) => Number(a) - Number(b));
      if (!keys.length) return null;
      const out = new Uint8Array(keys.length);
      for (let i = 0; i < keys.length; i++) out[i] = data[keys[i]] || 0;
      return out;
    }

    async function renderFrame(buf, frameId, recordFps = true) {
      isRendering = true;
      try {
        let tDecodeStart = performance.now();
        let bmp = await createImageBitmap(new Blob([buf], { type: 'image/jpeg' }));
        let tDecodeEnd = performance.now();
        lastImageSize = { width: bmp.width, height: bmp.height };
        updateImageInfo();
        let tDrawStart = performance.now();
        drawBitmap(bmp); bmp.close();
        let tDrawEnd = performance.now();
        updateCanvasOverlay();
        scheduleHistogramUpdate();
        if (recordFps) {
          recordFpsSample(tDrawEnd);
        }
        if (profileEnabled && frameId) {
          let r = profileRecords[frameId] || {};
          r.ts_decode_start = tDecodeStart;
          r.ts_decode_delta = tDecodeEnd - tDecodeStart;
          r.ts_draw_delta = tDrawEnd - tDrawStart;
          profileRecords[frameId] = r;
          if (frameId % 100 === 0) flushProfile();
        }
      } catch (e) {
        imageInfo.textContent = text('imageDecodeError', 'Image: decode error');
        console.error(e);
      }
      finally {
        isRendering = false;
        if (pendingFrame) {
          const f = pendingFrame;
          pendingFrame = null;
          renderFrame(f.data, f.frameId);
        } else if (resizeRenderPending && lastFrameData) {
          resizeRenderPending = false;
          renderFrame(lastFrameData, 0, false);
        }
      }
    }

    function drawBitmap(bmp) {
      const normalized = ((rotation % 360) + 360) % 360;
      const rotated = normalized === 90 || normalized === 270;
      const w = rotated ? bmp.height : bmp.width;
      const h = rotated ? bmp.width : bmp.height;
      if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; }
      applyCanvasScale();
      ctx.save();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (normalized === 90) {
        ctx.translate(canvas.width, 0); ctx.rotate(Math.PI / 2);
      } else if (normalized === 180) {
        ctx.translate(canvas.width, canvas.height); ctx.rotate(Math.PI);
      } else if (normalized === 270) {
        ctx.translate(0, canvas.height); ctx.rotate(3 * Math.PI / 2);
      }
      ctx.drawImage(bmp, 0, 0);
      ctx.restore();
      normalizeSelectedRoi();
    }

    function clearCanvas() {
      stopRecording();
      pendingFrame = null; lastFrameData = null; lastImageSize = null; isRendering = false; hasFrame = false;
      dragRoi = null; roiDragStart = null; isDraggingRoi = false; lastPixelPick = null;
      imageInfo.textContent = text('imageEmpty', 'Image: --');
      canvas.style.width = '';
      canvas.style.height = '';
      canvasStage.style.width = '';
      canvasStage.style.height = '';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      clearCanvasOverlay();
      clearHistogram();
      resetFps();
      updateControls();
    }

    function captureCurrentImage() {
      if (!hasFrame || !canvas.width || !canvas.height) {
        vscode.postMessage({ type: 'captureImage' });
        return;
      }
      canvas.toBlob(async (blob) => {
        vscode.postMessage({ type: 'captureImage', data: blob ? await blob.arrayBuffer() : undefined });
      }, 'image/png');
    }

    function updateImageInfo() {
      if (!hasFrame || !lastImageSize) {
        imageInfo.textContent = text('imageEmpty', 'Image: --');
        return;
      }
      imageInfo.textContent = `${text('image', 'Image')}: ${lastImageSize.width}×${lastImageSize.height} | ${scaleMode === 'fit' ? text('fit', 'Fit') : '1:1'}`;
    }

    function applyCanvasScale(centerOriginal = false) {
      const w = canvas.width;
      const h = canvas.height;
      const wrapW = canvasWrap.clientWidth;
      const wrapH = canvasWrap.clientHeight;
      canvasWrap.classList.toggle('original', scaleMode === 'original');

      if (!w || !h) {
        lastOriginalLayout = '';
        canvasStage.style.width = '';
        canvasStage.style.height = '';
        canvas.style.width = '';
        canvas.style.height = '';
        return;
      }

      if (scaleMode === 'original') {
        const stageW = Math.max(w, wrapW);
        const stageH = Math.max(h, wrapH);
        const layout = `${w}x${h}:${wrapW}x${wrapH}`;
        canvasStage.style.width = `${stageW}px`;
        canvasStage.style.height = `${stageH}px`;
        canvas.style.width = `${w}px`;
        canvas.style.height = `${h}px`;
        if (centerOriginal || layout !== lastOriginalLayout) {
          canvasWrap.scrollLeft = Math.max(0, (stageW - wrapW) / 2);
          canvasWrap.scrollTop = Math.max(0, (stageH - wrapH) / 2);
          lastOriginalLayout = layout;
        }
        updateCanvasOverlay();
        return;
      }

      lastOriginalLayout = '';
      canvasStage.style.width = '';
      canvasStage.style.height = '';
      const scale = Math.min(wrapW / w, wrapH / h);
      const safeScale = Number.isFinite(scale) && scale > 0 ? scale : 1;
      canvas.style.width = `${Math.max(1, Math.floor(w * safeScale))}px`;
      canvas.style.height = `${Math.max(1, Math.floor(h * safeScale))}px`;
      updateCanvasOverlay();
    }

    function resetFps() {
      fpsFrames = [];
      frameCount = 0;
      lastFpsValue = null;
      lastFpsSampleAt = 0;
      fpsDisplay.textContent = text('fpsEmpty', 'FPS: --');
    }

    function resetFpsSamples() {
      fpsFrames = [];
      lastFpsValue = null;
      lastFpsSampleAt = 0;
      updateFpsDisplay();
    }

    function trimFpsSamples(now) {
      const cutoff = now - fpsWindowMs;
      while (fpsFrames.length && fpsFrames[0] < cutoff) fpsFrames.shift();
    }

    function getFpsValue(now) {
      trimFpsSamples(now);
      if (fpsFrames.length >= 2) {
        const span = fpsFrames[fpsFrames.length - 1] - fpsFrames[0];
        if (span > 0) return ((fpsFrames.length - 1) * 1000) / span;
      }
      if (lastFpsValue !== null && now - lastFpsSampleAt <= fpsHoldMs) return lastFpsValue;
      return null;
    }

    function formatFps(value) {
      if (value === null) return '--';
      return value < 10 ? value.toFixed(1) : String(Math.round(value));
    }

    function updateFpsDisplay(now = performance.now()) {
      const value = formatFps(getFpsValue(now));
      fpsDisplay.textContent = frameCount
        ? formatText(text('fpsWithFrameCount', 'FPS: {value} (fc:{frameCount})'), { value, frameCount })
        : formatText(text('fpsLabel', 'FPS: {value}'), { value });
    }

    function recordFpsSample(now) {
      fpsFrames.push(now);
      const fps = getFpsValue(now);
      if (fps !== null) {
        lastFpsValue = fps;
        lastFpsSampleAt = now;
      }
      updateFpsDisplay(now);
    }

    function redrawFrameAfterResize() {
      if (resizeRenderFrame) cancelAnimationFrame(resizeRenderFrame);
      resizeRenderFrame = requestAnimationFrame(() => {
        resizeRenderFrame = 0;
        applyCanvasScale();
        if (!hasFrame || !lastFrameData) return;

        resizeRenderPending = true;
        if (!isRendering) {
          resizeRenderPending = false;
          renderFrame(lastFrameData, 0, false);
        }
      });
    }

    function updateControls() {
      disableBtn.disabled = currentState === 'disconnected' || currentState === 'connecting';
      disableBtn.textContent = previewDisabled ? '◉' : '⊘';
      disableBtn.title = previewDisabled ? text('enablePreview', 'Enable Preview') : text('disablePreview', 'Disable Preview');
      disableBtn.setAttribute('aria-label', disableBtn.title);
      scaleBtn.disabled = !hasFrame;
      scaleBtn.textContent = scaleMode === 'fit' ? '1:1' : '⛶';
      scaleBtn.title = scaleMode === 'fit' ? text('showOriginalSize', 'Show Original Size') : text('fitToWindow', 'Fit to Window');
      scaleBtn.setAttribute('aria-label', scaleBtn.title);
      scaleBtn.setAttribute('aria-pressed', scaleMode === 'original' ? 'true' : 'false');
      rotateBtn.disabled = !hasFrame;
      saveBtn.disabled = !hasFrame;
      pixelBtn.disabled = !hasFrame;
      pixelBtn.classList.toggle('active', pixelPickEnabled);
      pixelBtn.setAttribute('aria-pressed', pixelPickEnabled ? 'true' : 'false');
      roiBtn.disabled = !hasFrame;
      roiBtn.classList.toggle('active', roiSelectEnabled || !!selectedRoi);
      roiBtn.setAttribute('aria-pressed', roiSelectEnabled ? 'true' : 'false');
      recordBtn.disabled = !hasFrame && !isRecording;
      recordBtn.classList.toggle('recording', isRecording);
      recordBtn.title = isRecording ? text('stopRecording', 'Stop Recording') : text('recordVideo', 'Record Video');
      recordBtn.setAttribute('aria-label', recordBtn.title);
      canvas.style.cursor = getCanvasCursor();
    }

    function setVirtualTouchState(state) {
      virtualTouchSupported = state && state.supported === true;
      virtualTouchEnabled = virtualTouchSupported && state.enabled === true;
      updateControls();
    }

    function isHistogramMode(value) {
      return value === 'rgb' || value === 'grayscale' || value === 'lab' || value === 'yuv' || value === 'none';
    }

    function persistViewState() {
      vscode.setState({ scaleMode, histogramMode, selectedRoi });
    }

    function applyHistogramMode() {
      histogramSelect.value = histogramMode;
      histogramPanel.classList.toggle('hidden', histogramMode === 'none');
      clearHistogramHover();
      if (histogramMode === 'none') {
        clearHistogram();
      } else {
        scheduleHistogramUpdate(true);
      }
    }

    function getCanvasCursor() {
      if (!hasFrame) return '';
      if (roiSelectEnabled) return 'crosshair';
      if (pixelPickEnabled) return 'copy';
      return virtualTouchEnabled ? 'crosshair' : '';
    }

    function isValidRoi(roi) {
      return !!roi
        && Number.isFinite(roi.x) && Number.isFinite(roi.y)
        && Number.isFinite(roi.w) && Number.isFinite(roi.h)
        && roi.w > 0 && roi.h > 0;
    }

    function normalizeSelectedRoi() {
      if (!isValidRoi(selectedRoi) || !canvas.width || !canvas.height) {
        selectedRoi = null;
        return;
      }
      const x = clamp(Math.round(selectedRoi.x), 0, Math.max(0, canvas.width - 1));
      const y = clamp(Math.round(selectedRoi.y), 0, Math.max(0, canvas.height - 1));
      const right = clamp(Math.round(selectedRoi.x + selectedRoi.w), x + 1, canvas.width);
      const bottom = clamp(Math.round(selectedRoi.y + selectedRoi.h), y + 1, canvas.height);
      selectedRoi = { x, y, w: right - x, h: bottom - y };
    }

    function clearCanvasOverlay() {
      canvasOverlay.style.display = 'none';
      roiRectEl.style.display = 'none';
      dragRectEl.style.display = 'none';
      pixelMarkerEl.style.display = 'none';
    }

    function updateCanvasOverlay() {
      if (!hasFrame || !canvas.width || !canvas.height) {
        clearCanvasOverlay();
        return;
      }
      const width = Math.max(1, Math.round(canvas.clientWidth));
      const height = Math.max(1, Math.round(canvas.clientHeight));
      canvasOverlay.style.display = 'block';
      canvasOverlay.style.left = `${canvas.offsetLeft}px`;
      canvasOverlay.style.top = `${canvas.offsetTop}px`;
      canvasOverlay.style.width = `${width}px`;
      canvasOverlay.style.height = `${height}px`;
      drawOverlayRect(roiRectEl, selectedRoi);
      drawOverlayRect(dragRectEl, dragRoi);
      drawPixelMarker();
    }

    function drawOverlayRect(el, roi) {
      if (!isValidRoi(roi) || !canvas.width || !canvas.height) {
        el.style.display = 'none';
        return;
      }
      const sx = canvas.clientWidth / canvas.width;
      const sy = canvas.clientHeight / canvas.height;
      el.style.display = 'block';
      el.style.left = `${roi.x * sx}px`;
      el.style.top = `${roi.y * sy}px`;
      el.style.width = `${Math.max(1, roi.w * sx)}px`;
      el.style.height = `${Math.max(1, roi.h * sy)}px`;
    }

    function drawPixelMarker() {
      if (!lastPixelPick || !canvas.width || !canvas.height) {
        pixelMarkerEl.style.display = 'none';
        return;
      }
      const sx = canvas.clientWidth / canvas.width;
      const sy = canvas.clientHeight / canvas.height;
      pixelMarkerEl.style.display = 'block';
      pixelMarkerEl.style.left = `${lastPixelPick.x * sx}px`;
      pixelMarkerEl.style.top = `${lastPixelPick.y * sy}px`;
    }

    function setToolReadout(value) {
      toolReadout.textContent = value || '';
      toolReadout.title = value || '';
    }

    function clearPixelPick(clearReadout = true) {
      lastPixelPick = null;
      histogramTooltip.style.display = 'none';
      if (clearReadout) setToolReadout('');
      updateCanvasOverlay();
    }

    function clearHistogram() {
      if (histogramUpdateTimer) {
        clearTimeout(histogramUpdateTimer);
        histogramUpdateTimer = 0;
      }
      histogramUpdatePending = false;
      histogramHover = null;
      histogramTooltip.style.display = 'none';
      lastHistogramChannels = [];
      for (const channel of histogramChannels) {
        const plot = channel.canvas.getContext('2d');
        plot.clearRect(0, 0, channel.canvas.width, channel.canvas.height);
        channel.stats.textContent = '';
      }
    }

    function scheduleHistogramUpdate(force = false) {
      if (histogramMode === 'none') return;
      if (!hasFrame || !canvas.width || !canvas.height) {
        clearHistogram();
        return;
      }

      if (histogramUpdatePending && !force) return;

      const now = performance.now();
      const delay = force ? 0 : Math.max(0, histogramMinIntervalMs - (now - histogramLastAt));
      histogramUpdatePending = true;
      if (histogramUpdateTimer) clearTimeout(histogramUpdateTimer);
      histogramUpdateTimer = setTimeout(() => {
        histogramUpdateTimer = 0;
        histogramUpdatePending = false;
        histogramLastAt = performance.now();
        updateHistogram();
      }, delay);
    }

    function updateHistogram() {
      if (histogramMode === 'none') return;
      if (!hasFrame || !canvas.width || !canvas.height) {
        clearHistogram();
        return;
      }

      const sample = prepareHistogramSample();
      if (!sample) {
        clearHistogram();
        return;
      }

      try {
        const imageData = histogramSampleCtx.getImageData(0, 0, sample.width, sample.height);
        const channels = buildHistogram(imageData.data, histogramMode);
        lastHistogramChannels = channels;
        renderHistogramChannels(channels);
      } catch (error) {
        clearHistogram();
        console.error('Unable to sample preview canvas for histogram', error);
      }
    }

    function prepareHistogramSample() {
      if (!histogramSampleCtx || !canvas.width || !canvas.height) return null;
      const source = isValidRoi(selectedRoi)
        ? selectedRoi
        : { x: 0, y: 0, w: canvas.width, h: canvas.height };
      const scale = Math.min(1, histogramMaxSampleEdge / Math.max(source.w, source.h));
      const width = Math.max(1, Math.round(source.w * scale));
      const height = Math.max(1, Math.round(source.h * scale));
      if (histogramSampleCanvas.width !== width) histogramSampleCanvas.width = width;
      if (histogramSampleCanvas.height !== height) histogramSampleCanvas.height = height;
      histogramSampleCtx.clearRect(0, 0, width, height);
      histogramSampleCtx.drawImage(canvas, source.x, source.y, source.w, source.h, 0, 0, width, height);
      return { width, height };
    }

    function buildHistogram(pixels, mode) {
      if (mode === 'rgb') {
        const channels = [
          createChannel('R', 32, '#ff5454', '#5d2424', rgb5To8),
          createChannel('G', 64, '#69d96f', '#245d28', rgb6To8),
          createChannel('B', 32, '#5f8fff', '#24365d', rgb5To8)
        ];
        for (let i = 0; i < pixels.length; i += 4) {
          channels[0].bins[pixels[i] >> 3] += 1;
          channels[1].bins[pixels[i + 1] >> 2] += 1;
          channels[2].bins[pixels[i + 2] >> 3] += 1;
        }
        return finalizeChannels(channels);
      }

      if (mode === 'grayscale') {
        const channels = [createChannel('Y', 256, '#bdbdbd', '#4a4a4a', identityValue)];
        for (let i = 0; i < pixels.length; i += 4) {
          channels[0].bins[rgbToLuma(pixels[i], pixels[i + 1], pixels[i + 2])] += 1;
        }
        return finalizeChannels(channels);
      }

      if (mode === 'lab') {
        const channels = [
          createChannel('L', 101, '#bdbdbd', '#4a4a4a', identityValue),
          createChannel('A', 256, '#ccff32', '#4f5d24', offset128Value),
          createChannel('B', 256, '#4c91ff', '#243d5d', offset128Value)
        ];
        for (let i = 0; i < pixels.length; i += 4) {
          const lab = rgbToLab(pixels[i], pixels[i + 1], pixels[i + 2]);
          channels[0].bins[lab[0]] += 1;
          channels[1].bins[lab[1] + 128] += 1;
          channels[2].bins[lab[2] + 128] += 1;
        }
        return finalizeChannels(channels);
      }

      const channels = [
        createChannel('Y', 256, '#bdbdbd', '#4a4a4a', identityValue),
        createChannel('U', 256, '#32df86', '#245d3b', offset128Value),
        createChannel('V', 256, '#cc54ff', '#4f245d', offset128Value)
      ];
      for (let i = 0; i < pixels.length; i += 4) {
        const yuv = rgbToYuv(pixels[i], pixels[i + 1], pixels[i + 2]);
        channels[0].bins[yuv[0]] += 1;
        channels[1].bins[yuv[1] + 128] += 1;
        channels[2].bins[yuv[2] + 128] += 1;
      }
      return finalizeChannels(channels);
    }

    function createChannel(label, bins, stroke, fill, displayValue) {
      return {
        label,
        bins: new Uint32Array(bins),
        stroke,
        fill,
        displayValue,
        stats: emptyStats()
      };
    }

    function finalizeChannels(channels) {
      for (const channel of channels) {
        channel.stats = computeStats(channel.bins, channel.displayValue);
      }
      return channels;
    }

    function computeStats(bins, displayValue) {
      let total = 0;
      let weighted = 0;
      let maxCount = 0;
      let modeBin = 0;
      let minBin = -1;
      let maxBin = 0;

      for (let i = 0; i < bins.length; i++) {
        const count = bins[i];
        if (!count) continue;
        const value = displayValue(i);
        total += count;
        weighted += value * count;
        if (minBin < 0) minBin = i;
        maxBin = i;
        if (count > maxCount) {
          maxCount = count;
          modeBin = i;
        }
      }

      if (!total) return emptyStats();

      const mean = Math.round(weighted / total);
      const lowerTarget = Math.floor((total + 3) / 4);
      const medianTarget = Math.floor((total + 1) / 2);
      const upperTarget = Math.floor(((total * 3) + 3) / 4);
      let lowerQuartile = displayValue(minBin);
      let median = displayValue(minBin);
      let upperQuartile = displayValue(maxBin);
      let seen = 0;
      let variance = 0;

      for (let i = 0; i < bins.length; i++) {
        const count = bins[i];
        if (!count) continue;
        const value = displayValue(i);
        const next = seen + count;
        if (seen < lowerTarget && lowerTarget <= next) lowerQuartile = value;
        if (seen < medianTarget && medianTarget <= next) median = value;
        if (seen < upperTarget && upperTarget <= next) upperQuartile = value;
        variance += count * (value - mean) * (value - mean);
        seen = next;
      }

      return {
        mean,
        median,
        mode: displayValue(modeBin),
        stdev: Math.round(Math.sqrt(variance / total)),
        min: displayValue(minBin),
        max: displayValue(maxBin),
        lq: lowerQuartile,
        uq: upperQuartile,
        maxCount
      };
    }

    function emptyStats() {
      return { mean: 0, median: 0, mode: 0, stdev: 0, min: 0, max: 0, lq: 0, uq: 0, maxCount: 0 };
    }

    function renderHistogramChannels(channels) {
      histogramChannels.forEach((slot, index) => {
        const channel = channels[index];
        slot.el.hidden = !channel;
        if (!channel) return;
        slot.title.textContent = channel.label;
        drawHistogram(slot.canvas, channel, histogramHover && histogramHover.index === index ? histogramHover.bin : null);
        renderStats(slot.stats, channel.stats);
      });
    }

    function redrawHistogramPlots() {
      if (histogramMode === 'none' || !lastHistogramChannels.length) return;
      renderHistogramChannels(lastHistogramChannels);
    }

    function drawHistogram(plotCanvas, channel, hoverBin = null) {
      const plot = plotCanvas.getContext('2d');
      const cssWidth = Math.max(1, Math.floor(plotCanvas.clientWidth || plotCanvas.width));
      const cssHeight = Math.max(1, Math.floor(plotCanvas.clientHeight || plotCanvas.height));
      const ratio = window.devicePixelRatio || 1;
      const width = Math.max(1, Math.floor(cssWidth * ratio));
      const height = Math.max(1, Math.floor(cssHeight * ratio));

      if (plotCanvas.width !== width || plotCanvas.height !== height) {
        plotCanvas.width = width;
        plotCanvas.height = height;
      }

      plot.clearRect(0, 0, width, height);
      plot.fillStyle = '#151515';
      plot.fillRect(0, 0, width, height);
      plot.strokeStyle = '#303030';
      plot.lineWidth = ratio;
      plot.beginPath();
      plot.moveTo(0, height - 0.5 * ratio);
      plot.lineTo(width, height - 0.5 * ratio);
      plot.stroke();

      const maxCount = channel.stats.maxCount || 1;
      const binWidth = width / channel.bins.length;
      plot.beginPath();
      plot.moveTo(0, height);
      for (let i = 0; i < channel.bins.length; i++) {
        const x = (i + 0.5) * binWidth;
        const y = height - ((channel.bins[i] / maxCount) * (height - 6 * ratio)) - 3 * ratio;
        plot.lineTo(x, y);
      }
      plot.lineTo(width, height);
      plot.closePath();
      plot.fillStyle = channel.fill;
      plot.fill();
      plot.strokeStyle = channel.stroke;
      plot.lineWidth = Math.max(1, ratio);
      plot.stroke();

      if (hoverBin !== null) {
        const x = (hoverBin + 0.5) * binWidth;
        plot.strokeStyle = '#f2f2f2';
        plot.lineWidth = Math.max(1, ratio);
        plot.beginPath();
        plot.moveTo(x, 0);
        plot.lineTo(x, height);
        plot.stroke();
      }
    }

    function updateHistogramHover(slot, index, event) {
      const channel = lastHistogramChannels[index];
      if (!channel || !channel.bins.length) {
        clearHistogramHover();
        return;
      }
      const rect = slot.canvas.getBoundingClientRect();
      if (!rect.width || !rect.height) {
        clearHistogramHover();
        return;
      }
      const x = clamp(event.clientX - rect.left, 0, rect.width);
      const bin = clamp(Math.floor((x / rect.width) * channel.bins.length), 0, channel.bins.length - 1);
      const position = channel.displayValue(bin);
      const count = channel.bins[bin];
      histogramHover = { index, bin };
      renderHistogramChannels(lastHistogramChannels);
      showHistogramTooltip(
        event.clientX,
        event.clientY,
        formatText(text('histogramTooltip', 'Count {count} ({label} {position})'), { count, label: channel.label, position })
      );
    }

    function showHistogramTooltip(clientX, clientY, text) {
      histogramTooltip.textContent = text;
      histogramTooltip.style.display = 'block';
      const margin = 12;
      const rect = histogramTooltip.getBoundingClientRect();
      let left = clientX + margin;
      let top = clientY + margin;
      if (left + rect.width > window.innerWidth) left = clientX - rect.width - margin;
      if (top + rect.height > window.innerHeight) top = clientY - rect.height - margin;
      histogramTooltip.style.left = `${Math.max(4, left)}px`;
      histogramTooltip.style.top = `${Math.max(4, top)}px`;
    }

    function clearHistogramHover() {
      const hadHover = !!histogramHover;
      histogramHover = null;
      histogramTooltip.style.display = 'none';
      if (hadHover && lastHistogramChannels.length) {
        renderHistogramChannels(lastHistogramChannels);
      }
    }

    function renderStats(statsEl, stats) {
      const rows = [
        [text('statMean', 'Mean'), stats.mean], [text('statMedian', 'Median'), stats.median],
        [text('statMode', 'Mode'), stats.mode], [text('statStdev', 'StDev'), stats.stdev],
        [text('statMin', 'Min'), stats.min], [text('statMax', 'Max'), stats.max],
        [text('statLq', 'LQ'), stats.lq], [text('statUq', 'UQ'), stats.uq]
      ];
      statsEl.textContent = '';
      for (const [label, value] of rows) {
        const labelEl = document.createElement('span');
        labelEl.className = 'stat-label';
        labelEl.textContent = label;
        const valueEl = document.createElement('span');
        valueEl.className = 'stat-value';
        valueEl.textContent = String(value);
        statsEl.append(labelEl, valueEl);
      }
    }

    function rgb5To8(value) {
      return Math.round((value * 255) / 31);
    }

    function rgb6To8(value) {
      return Math.round((value * 255) / 63);
    }

    function identityValue(value) {
      return value;
    }

    function offset128Value(value) {
      return value - 128;
    }

    function rgbToLuma(r, g, b) {
      return clamp(Math.round((0.299 * r) + (0.587 * g) + (0.114 * b)), 0, 255);
    }

    function rgbToYuv(r, g, b) {
      const y = clamp(Math.round((0.299 * r) + (0.587 * g) + (0.114 * b)), 0, 255);
      const u = clamp(Math.round((-0.168736 * r) - (0.331264 * g) + (0.5 * b)), -128, 127);
      const v = clamp(Math.round((0.5 * r) - (0.418688 * g) - (0.081312 * b)), -128, 127);
      return [y, u, v];
    }

    function rgbToLab(r, g, b) {
      const sr = pivotRgb(r / 255);
      const sg = pivotRgb(g / 255);
      const sb = pivotRgb(b / 255);
      const x = ((0.4124564 * sr) + (0.3575761 * sg) + (0.1804375 * sb)) / 0.95047;
      const y = (0.2126729 * sr) + (0.7151522 * sg) + (0.0721750 * sb);
      const z = ((0.0193339 * sr) + (0.1191920 * sg) + (0.9503041 * sb)) / 1.08883;
      const fx = pivotLab(x);
      const fy = pivotLab(y);
      const fz = pivotLab(z);
      const l = clamp(Math.round((116 * fy) - 16), 0, 100);
      const a = clamp(Math.round(500 * (fx - fy)), -128, 127);
      const bb = clamp(Math.round(200 * (fy - fz)), -128, 127);
      return [l, a, bb];
    }

    function pivotRgb(value) {
      return value <= 0.04045 ? value / 12.92 : Math.pow((value + 0.055) / 1.055, 2.4);
    }

    function pivotLab(value) {
      return value > 0.008856 ? Math.cbrt(value) : ((7.787037 * value) + (16 / 116));
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    disableBtn.addEventListener('click', () => {
      vscode.postMessage({
        type: 'previewCommand',
        command: previewDisabled ? 'setPreviewEnabled' : 'setPreviewDisabled'
      });
    });
    rotateBtn.addEventListener('click', () => {
      rotation = (rotation + 90) % 360;
      selectedRoi = null;
      dragRoi = null;
      roiDragStart = null;
      lastPixelPick = null;
      persistViewState();
      setToolReadout('');
      if (lastFrameData && !isRendering) renderFrame(lastFrameData, 0, false);
    });
    scaleBtn.addEventListener('click', () => {
      if (!hasFrame) return;
      scaleMode = scaleMode === 'fit' ? 'original' : 'fit';
      persistViewState();
      applyCanvasScale(scaleMode === 'original');
      updateImageInfo();
      updateControls();
    });
    histogramSelect.addEventListener('change', () => {
      histogramMode = isHistogramMode(histogramSelect.value) ? histogramSelect.value : 'none';
      persistViewState();
      applyHistogramMode();
    });
    saveBtn.addEventListener('click', () => {
      if (!hasFrame) return;
      canvas.toBlob(async (blob) => {
        if (!blob) return;
        vscode.postMessage({ type: 'saveImage', data: await blob.arrayBuffer() });
      }, 'image/png');
    });
    pixelBtn.addEventListener('click', () => {
      if (!hasFrame) return;
      pixelPickEnabled = !pixelPickEnabled;
      if (pixelPickEnabled) {
        roiSelectEnabled = false;
        clearPixelPick();
      } else {
        clearPixelPick();
      }
      updateControls();
    });
    roiBtn.addEventListener('click', () => {
      if (!hasFrame) return;
      roiSelectEnabled = !roiSelectEnabled;
      if (roiSelectEnabled) {
        pixelPickEnabled = false;
        clearPixelPick();
      }
      if (!roiSelectEnabled && selectedRoi) {
        selectedRoi = null;
        dragRoi = null;
        persistViewState();
        scheduleHistogramUpdate(true);
        updateCanvasOverlay();
        setToolReadout('');
      }
      updateControls();
    });
    recordBtn.addEventListener('click', () => {
      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    });
    histogramChannels.forEach((slot, index) => {
      slot.canvas.classList.add('hoverable');
      slot.canvas.addEventListener('mousemove', (event) => updateHistogramHover(slot, index, event));
      slot.canvas.addEventListener('mouseleave', clearHistogramHover);
    });
    histogramPanel.addEventListener('scroll', clearHistogramHover);
    window.addEventListener('blur', clearHistogramHover);
    window.addEventListener('resize', clearHistogramHover);
    canvas.addEventListener('pointerdown', handleCanvasPointerDown);
    canvas.addEventListener('pointermove', handleCanvasPointerMove);
    canvas.addEventListener('pointerup', handleCanvasPointerUp);
    canvas.addEventListener('pointercancel', cancelRoiDrag);
    canvas.addEventListener('click', handleCanvasClick);
    document.addEventListener('pointerdown', handleDocumentPointerDown, true);
    document.addEventListener('keydown', (event) => {
      if (event.key !== 'Escape') return;
      if (isDraggingRoi) cancelRoiDrag();
      if (lastPixelPick) clearPixelPick();
      if (selectedRoi) {
        selectedRoi = null;
        persistViewState();
        scheduleHistogramUpdate(true);
        updateCanvasOverlay();
        setToolReadout('');
      }
    });

    function handleDocumentPointerDown(event) {
      if (!pixelPickEnabled || !lastPixelPick) return;
      const path = typeof event.composedPath === 'function' ? event.composedPath() : [];
      if (event.target === canvas || path.includes(canvas)) return;
      clearPixelPick();
    }

    function handleCanvasPointerDown(event) {
      if (!roiSelectEnabled || !hasFrame || !canvas.width || !canvas.height || event.button !== 0) return;
      const point = mapPointerToCanvas(event);
      if (!point) return;
      event.preventDefault();
      canvas.setPointerCapture(event.pointerId);
      isDraggingRoi = true;
      roiDragStart = point;
      dragRoi = { x: point.x, y: point.y, w: 1, h: 1 };
      updateCanvasOverlay();
    }

    function handleCanvasPointerMove(event) {
      if (!isDraggingRoi || !roiDragStart) return;
      const point = mapPointerToCanvas(event);
      if (!point) return;
      event.preventDefault();
      dragRoi = makeRoiFromPoints(roiDragStart.x, roiDragStart.y, point.x, point.y);
      updateCanvasOverlay();
    }

    function handleCanvasPointerUp(event) {
      if (!isDraggingRoi) return;
      event.preventDefault();
      const roi = dragRoi && dragRoi.w >= 2 && dragRoi.h >= 2
        ? { x: dragRoi.x, y: dragRoi.y, w: dragRoi.w, h: dragRoi.h }
        : null;
      dragRoi = null;
      roiDragStart = null;
      isDraggingRoi = false;
      try { canvas.releasePointerCapture(event.pointerId); } catch (_) {}
      if (roi) {
        selectedRoi = roi;
        persistViewState();
        scheduleHistogramUpdate(true);
        setToolReadout(formatText(text('roiReadout', 'ROI x:{x} y:{y} w:{w} h:{h}'), roi));
      }
      updateCanvasOverlay();
      updateControls();
    }

    function cancelRoiDrag() {
      dragRoi = null;
      roiDragStart = null;
      isDraggingRoi = false;
      updateCanvasOverlay();
    }

    function handleCanvasClick(event) {
      if (isDraggingRoi) return;
      if (pixelPickEnabled) {
        pickPixel(event);
        return;
      }
      if (!virtualTouchEnabled || roiSelectEnabled || !hasFrame || !lastImageSize || !canvas.width || !canvas.height) return;
      const point = mapCanvasClickToOriginal(event);
      if (!point) return;
      vscode.postMessage({
        type: 'virtualTouch',
        x: point.x,
        y: point.y,
        sourceWidth: lastImageSize.width,
        sourceHeight: lastImageSize.height
      });
    }

    function pickPixel(event) {
      const point = mapPointerToCanvas(event);
      if (!point) return;
      try {
        const pixel = ctx.getImageData(point.x, point.y, 1, 1).data;
        lastPixelPick = { x: point.x, y: point.y };
        updateCanvasOverlay();
        const value = formatText(
          text('pixelReadout', 'X:{x} Y:{y} RGB({r},{g},{b})'),
          { x: point.x, y: point.y, r: pixel[0], g: pixel[1], b: pixel[2] }
        );
        setToolReadout(value);
        showHistogramTooltip(event.clientX, event.clientY, value);
      } catch (error) {
        console.error('Unable to sample preview pixel', error);
      }
    }

    function mapPointerToCanvas(event) {
      if (!hasFrame || !canvas.width || !canvas.height) return null;
      const rect = canvas.getBoundingClientRect();
      if (!rect.width || !rect.height) return null;
      return {
        x: clamp(Math.floor(((event.clientX - rect.left) / rect.width) * canvas.width), 0, canvas.width - 1),
        y: clamp(Math.floor(((event.clientY - rect.top) / rect.height) * canvas.height), 0, canvas.height - 1)
      };
    }

    function makeRoiFromPoints(x1, y1, x2, y2) {
      const left = clamp(Math.min(x1, x2), 0, canvas.width - 1);
      const top = clamp(Math.min(y1, y2), 0, canvas.height - 1);
      const right = clamp(Math.max(x1, x2), left, canvas.width - 1);
      const bottom = clamp(Math.max(y1, y2), top, canvas.height - 1);
      return { x: left, y: top, w: right - left + 1, h: bottom - top + 1 };
    }

    function startRecording() {
      if (!hasFrame || isRecording || !canvas.captureStream || typeof MediaRecorder === 'undefined') {
        setToolReadout(text('recordingUnavailable', 'Video recording is unavailable in this webview'));
        return;
      }

      const choice = selectRecordingType();
      if (!choice) {
        setToolReadout(text('recordingUnavailable', 'Video recording is unavailable in this webview'));
        return;
      }

      try {
        const fps = Math.max(1, Math.min(60, Math.round(getFpsValue(performance.now()) || 30)));
        const stream = canvas.captureStream(fps);
        recordedChunks = [];
        recordingMimeType = choice.mimeType;
        recordingExtension = choice.extension;
        mediaRecorder = new MediaRecorder(stream, { mimeType: choice.mimeType });
        mediaRecorder.addEventListener('dataavailable', (event) => {
          if (event.data && event.data.size > 0) recordedChunks.push(event.data);
        });
        mediaRecorder.addEventListener('stop', saveRecording);
        mediaRecorder.addEventListener('error', (event) => {
          setToolReadout(event.error?.message || text('recordingFailed', 'Recording failed'));
          stopRecording();
        });
        mediaRecorder.start(1000);
        isRecording = true;
        setToolReadout(formatText(text('recordingStarted', 'Recording {format}'), { format: recordingExtension.toUpperCase() }));
        updateControls();
      } catch (error) {
        mediaRecorder = null;
        isRecording = false;
        setToolReadout(error instanceof Error ? error.message : text('recordingFailed', 'Recording failed'));
        updateControls();
      }
    }

    function stopRecording() {
      if (!mediaRecorder) return;
      const recorder = mediaRecorder;
      mediaRecorder = null;
      isRecording = false;
      if (recorder.state !== 'inactive') {
        try { recorder.requestData(); } catch (_) {}
        recorder.stop();
      } else {
        void saveRecording();
      }
      for (const track of recorder.stream.getTracks()) track.stop();
      updateControls();
    }

    async function saveRecording() {
      if (!recordedChunks.length) {
        setToolReadout('');
        return;
      }
      const blob = new Blob(recordedChunks, { type: recordingMimeType });
      recordedChunks = [];
      vscode.postMessage({
        type: 'saveVideo',
        data: await blob.arrayBuffer(),
        mimeType: recordingMimeType,
        extension: recordingExtension
      });
      setToolReadout(formatText(text('recordingSaved', 'Recording ready ({format})'), { format: recordingExtension.toUpperCase() }));
    }

    function selectRecordingType() {
      const candidates = [
        { mimeType: 'video/mp4;codecs=h264', extension: 'mp4' },
        { mimeType: 'video/mp4', extension: 'mp4' },
        { mimeType: 'video/webm;codecs=vp9', extension: 'webm' },
        { mimeType: 'video/webm;codecs=vp8', extension: 'webm' },
        { mimeType: 'video/webm', extension: 'webm' }
      ];
      if (!MediaRecorder.isTypeSupported) return candidates[candidates.length - 1];
      return candidates.find((candidate) => MediaRecorder.isTypeSupported(candidate.mimeType)) || null;
    }

    function mapCanvasClickToOriginal(event) {
      const rect = canvas.getBoundingClientRect();
      if (!rect.width || !rect.height) return null;
      const canvasX = clamp(Math.floor(((event.clientX - rect.left) / rect.width) * canvas.width), 0, canvas.width - 1);
      const canvasY = clamp(Math.floor(((event.clientY - rect.top) / rect.height) * canvas.height), 0, canvas.height - 1);
      const normalized = ((rotation % 360) + 360) % 360;
      const srcW = lastImageSize.width;
      const srcH = lastImageSize.height;
      let x = canvasX;
      let y = canvasY;

      if (normalized === 90) {
        x = canvasY;
        y = canvas.width - canvasX - 1;
      } else if (normalized === 180) {
        x = canvas.width - canvasX - 1;
        y = canvas.height - canvasY - 1;
      } else if (normalized === 270) {
        x = canvas.height - canvasY - 1;
        y = canvasX;
      }

      return {
        x: clamp(x, 0, srcW - 1),
        y: clamp(y, 0, srcH - 1)
      };
    }
    function flushProfile() {
      let ids = Object.keys(profileRecords).map(Number).sort((a,b)=>a-b).slice(-100);
      if (ids.length < 2) return;
      let decodeDeltas = [], drawDeltas = [];
      for (let fid of ids) {
        let r = profileRecords[fid];
        if (r && r.ts_decode_delta !== undefined) decodeDeltas.push(r.ts_decode_delta);
        if (r && r.ts_draw_delta !== undefined) drawDeltas.push(r.ts_draw_delta);
      }
      let stats = (arr) => {
        arr.sort((a,b)=>a-b);
        let n = arr.length;
        return { avg: arr.reduce((s,v)=>s+v,0)/n, p95: arr[Math.floor(n*0.95)], max: arr[n-1] };
      };
      let report = {};
      if (decodeDeltas.length >= 2) report.decode = stats(decodeDeltas);
      if (drawDeltas.length >= 2) report.draw = stats(drawDeltas);
      vscode.postMessage({ type: 'profile', frameRange: ids[0]+'-'+ids[ids.length-1], segments: report });
      // Keep only last 20
      let keep = ids.slice(-20);
      let keepSet = new Set(keep);
      for (let fid of Object.keys(profileRecords)) { if (!keepSet.has(+fid)) delete profileRecords[fid]; }
    }

    if (window.ResizeObserver) {
      new ResizeObserver(() => redrawFrameAfterResize()).observe(canvasWrap);
      new ResizeObserver(() => redrawHistogramPlots()).observe(histogramPanel);
    } else {
      window.addEventListener('resize', redrawFrameAfterResize);
      window.addEventListener('resize', redrawHistogramPlots);
    }
    window.addEventListener('focus', resetFpsSamples);
    window.addEventListener('blur', resetFpsSamples);
    document.addEventListener('visibilitychange', resetFpsSamples);

    setInterval(() => {
      updateFpsDisplay();
    }, 500);

    function applyLocalization() {
      document.documentElement.lang = navigator.language || 'en';
      document.title = text('previewTitle', 'CanMV Preview');
      imageInfo.textContent = text('imageEmpty', 'Image: --');
      fpsDisplay.textContent = text('fpsEmpty', 'FPS: --');
      disableBtn.title = text('disablePreview', 'Disable Preview');
      disableBtn.setAttribute('aria-label', text('disablePreview', 'Disable Preview'));
      scaleBtn.title = text('showOriginalSize', 'Show Original Size');
      scaleBtn.setAttribute('aria-label', text('showOriginalSize', 'Show Original Size'));
      rotateBtn.title = text('rotateFrame', 'Rotate Frame');
      rotateBtn.setAttribute('aria-label', text('rotateFrame', 'Rotate Frame'));
      saveBtn.title = text('saveImage', 'Save Image');
      saveBtn.setAttribute('aria-label', text('saveImage', 'Save Image'));
      pixelBtn.title = text('pickPixelValue', 'Pick Pixel Value');
      pixelBtn.setAttribute('aria-label', text('pickPixelValue', 'Pick Pixel Value'));
      roiBtn.title = text('selectHistogramRoi', 'Select Histogram ROI');
      roiBtn.setAttribute('aria-label', text('selectHistogramRoi', 'Select Histogram ROI'));
      recordBtn.title = text('recordVideo', 'Record Video');
      recordBtn.setAttribute('aria-label', text('recordVideo', 'Record Video'));
      document.querySelector('.select-label').textContent = text('histogram', 'Histogram');
      histogramSelect.title = text('histogramColorSpace', 'Histogram color space');
      histogramSelect.setAttribute('aria-label', text('histogramColorSpace', 'Histogram color space'));
      const options = {
        rgb: text('rgbColorSpace', 'RGB Color Space'),
        grayscale: text('grayscaleColorSpace', 'Grayscale Color Space'),
        lab: text('labColorSpace', 'LAB Color Space'),
        yuv: text('yuvColorSpace', 'YUV Color Space'),
        none: text('none', 'None')
      };
      for (const option of histogramSelect.options) {
        option.textContent = options[option.value] || option.textContent;
      }
    }

    applyLocalization();
    statusDot.className = 'indicator off';
    stateText.textContent = text('stateDisconnected', 'Disconnected');
    applyCanvasScale();
    applyHistogramMode();
    updateControls();
  </script>
</body>
